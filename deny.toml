# cargo-deny configuration.
# Rejects licenses incompatible with Apache-2.0 and flags security advisories.

[licenses]
# Allow these permissive licenses in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
]
# Explicitly reject strong-copyleft / source-available licenses.
# AGPL, SSPL, GPL, LGPL, and EUPL are incompatible with an Apache-2.0 project.
deny = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "GPL-2.0",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "SSPL-1.0",
    "EUPL-1.1",
    "EUPL-1.2",
]
# Confidence threshold for license detection from license text.
confidence-threshold = 0.8

[licenses.private]
# Reject private/unlisted dependencies (would break public builds).
ignore = false

[advisories]
# Fail the build on any known vulnerability in the dependency tree.
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
ignore = []

[bans]
# Warn on duplicate crate versions (not a hard failure — common in Rust trees).
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates from crates.io + a couple of explicit git sources.
# The OpenShell fork is the only git dependency.
unknown-registry = "warn"
unknown-git = "warn"
allow-git = [
    "https://github.com/Infrastacks/OpenShell.git",
]
