# cargo-deny configuration (schema v2).
# Rejects licenses incompatible with Apache-2.0 and flags security advisories.

[graph]
# Apply to the full dependency graph.
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# Yanked crates are always a hard failure (they're broken by definition).
yanked = "deny"
# Unmaintained crates: scope to direct workspace deps (not the full transitive
# set, which is too noisy). The v0.1.0 tree carries transitive advisories
# (anyhow UB, rustls-pemfile unmaintained, a SHAKE squeeze bug) that need
# scheduled dependency bumps — listed in `ignore` below with reasons, tracked
# separately. Remove from `ignore` and bump to resolve.
unmaintained = "workspace"
ignore = [
    # anyhow: UB via Error::context + downcast_mut. Transitive (rustls/tonic).
    # No safe behavior on our code paths (we don't downcast_mut). Bump pending.
    { id = "RUSTSEC-2026-0190", reason = "transitive; not exercised on our paths; bump pending" },
    # rustls-pemfile: unmaintained, transitive via rustls/axum-server/tonic.
    { id = "RUSTSEC-2025-0134", reason = "transitive via rustls; no maintained replacement yet; bump pending" },
    # SHAKE squeeze incremental bug (transitive crypto).
    { id = "RUSTSEC-2026-0074", reason = "transitive crypto; not on a path we expose; bump pending" },
    # russh-cryptovec: transitive via russh (confidential-tier SSH). Upgrade path exists (>=0.60.3).
    { id = "RUSTSEC-2023-0071", reason = "transitive via russh; bump russh to resolve" },
    { id = "RUSTSEC-2026-0153", reason = "transitive; bump pending" },
    { id = "RUSTSEC-2026-0154", reason = "transitive; bump pending" },
]

[licenses]
version = 2
# Confidence threshold for license detection from license text.
confidence-threshold = 0.8
# v2 is allow-list-based: only licenses listed below are permitted. Copyleft
# licenses (GPL, AGPL, LGPL, EUPL, SSPL) are rejected by omission — they're
# incompatible with an Apache-2.0 project and intentionally not in the list.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
    # Permissive data license used by some transitive crates (e.g. unicode-icu data).
    "CDLA-Permissive-2.0",
]

[bans]
# Warn on duplicate crate versions (not a hard failure — common in Rust trees).
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates from crates.io + the explicit git source below.
unknown-registry = "warn"
unknown-git = "warn"
allow-git = [
    "https://github.com/Infrastacks/OpenShell.git",
]
