# Release pipeline — one immutable, signed NeuronEdge Enclave candidate bundle.
#
# The candidate job builds every publishable component once, resolves the
# component manifest, generates checksums/SBOM/provenance, signs the bundle,
# verifies it, and uploads the complete staging directory. Publication and
# environment gates may only consume that artifact; they never rebuild it.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  gauntlet:
    name: pre-release gauntlet
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: release component contract
        run: sh deploy/test-release-contract.sh
      - name: Check advisory exception ownership and expiry
        run: sh scripts/check-advisory-exceptions.sh deny.toml
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace --lib (excludes ne-e2e; needs KVM host)
        run: cargo test --workspace --lib
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: npm ci
        working-directory: sdk/typescript
        run: npm ci
      - name: npm run typecheck
        working-directory: sdk/typescript
        run: npm run typecheck
      - name: npm run lint
        working-directory: sdk/typescript
        run: npm run lint
      - name: npm run test
        working-directory: sdk/typescript
        run: npm run test

  version-check:
    name: version consistency
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: ver
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"
      - name: Assert all sources match the tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          cargo_v=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          ts_v=$(jq -r .version sdk/typescript/package.json)
          py_v=$(grep -m1 '^version' sdk/python/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          py_init_v=$(grep -E '^__version__' sdk/python/src/ne/__init__.py | sed -E 's/.*"(.*)".*/\1/')
          contract_v=$(jq -r .release_version deploy/release-components.json)
          for src in \
            "Cargo.toml:$cargo_v" \
            "package.json:$ts_v" \
            "pyproject.toml:$py_v" \
            "__init__.py:$py_init_v" \
            "release-components.json:$contract_v"
          do
            name="${src%%:*}"
            val="${src##*:}"
            if [ "$val" != "$VERSION" ]; then
              echo "::error::$name has version '$val' but tag is '$VERSION'. Bump all sources before tagging."
              exit 1
            fi
            echo "$name -> $val (ok)"
          done

  candidate:
    name: build and sign immutable candidate
    runs-on: ubuntu-24.04
    needs: [gauntlet, version-check]
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          python -m pip install --upgrade build
      - name: Build nee with all supported execution profiles
        run: >-
          cargo build --release
          --target x86_64-unknown-linux-musl
          -p ne-enclave
          --features confidential-cvm
      - name: Build pinned OpenShell sandbox (static musl)
        run: |
          set -euo pipefail
          git clone https://github.com/Infrastacks/OpenShell.git "$RUNNER_TEMP/OpenShell"
          git -C "$RUNNER_TEMP/OpenShell" checkout --detach 70328542941838612a75b62c3cc365e01594c0c3
          cargo build \
            --manifest-path "$RUNNER_TEMP/OpenShell/Cargo.toml" \
            --release \
            --target x86_64-unknown-linux-musl \
            -p openshell-sandbox
      - name: Stage runtime and install assets
        run: |
          set -euo pipefail
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/release/nee \
            staging/nee-x86_64-unknown-linux-musl
          cp "$RUNNER_TEMP/OpenShell/target/x86_64-unknown-linux-musl/release/openshell-sandbox" \
            staging/openshell-sandbox-x86_64-unknown-linux-musl
          cp crates/ne/templates/openshell-policy.rego staging/openshell-policy.rego
          cp crates/ne/templates/openshell-policy.yaml staging/openshell-policy.yaml
          cp deploy/install.sh staging/install.sh
          cp deploy/release-components.json staging/release-components.json
      - name: Build TypeScript candidate package
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm pack --pack-destination ../../staging
      - name: Build Python candidate packages
        working-directory: sdk/python
        run: python -m build --outdir ../../staging
      - name: Assert candidate SDK filenames
        run: |
          test -f staging/neuronedge-enclave-0.2.0.tgz
          test -f staging/neuronedge_enclave-0.2.0-py3-none-any.whl
          test -f staging/neuronedge_enclave-0.2.0.tar.gz
      - name: Verify static linkage
        run: |
          set -euo pipefail
          for binary in \
            target/x86_64-unknown-linux-musl/release/nee \
            "$RUNNER_TEMP/OpenShell/target/x86_64-unknown-linux-musl/release/openshell-sandbox"
          do
            description="$(file "$binary")"
            echo "$description"
            case "$description" in
              *"statically linked"* | *"static-pie linked"*) ;;
              *)
                echo "::error::$binary is not statically linked"
                exit 1
                ;;
            esac
          done
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: staging
          format: spdx-json
          output-file: staging/ne-enclave.spdx.json
          artifact-name: ne-enclave.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Resolve release manifest and checksums
        run: |
          set -euo pipefail
          for key in $(jq -r '
            .assets
            | keys[]
            | select(. != "checksums" and . != "provenance")
          ' staging/release-components.json); do
            file="$(jq -r --arg key "$key" \
              '.assets[$key]' staging/release-components.json)"
            test -f "staging/$file"
            digest="$(sha256sum "staging/$file" | awk '{print $1}')"
            tmp="$(mktemp)"
            jq --arg key "$key" --arg digest "$digest" \
              '.resolved_sha256[$key] = $digest' \
              staging/release-components.json > "$tmp"
            mv "$tmp" staging/release-components.json
          done
          for file in staging/*; do
            case "$file" in
              */SHA256SUMS|*.sigstore.json) continue ;;
            esac
            sha256sum "$file"
          done | sed 's#staging/##' | sort -k2 > staging/SHA256SUMS
          cat staging/SHA256SUMS
      - name: Generate build provenance
        id: provenance
        uses: actions/attest@v4
        with:
          subject-checksums: staging/SHA256SUMS
      - name: Stage provenance bundle
        run: >-
          cp '${{ steps.provenance.outputs.bundle-path }}'
          staging/ne-enclave.provenance.sigstore.json
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign every ordinary candidate component
        run: |
          set -euo pipefail
          for file in staging/*; do
            case "$file" in
              *.sigstore.json) continue ;;
            esac
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
      - name: Verify candidate signatures and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          identity='https://github\.com/Infrastacks/ne-enclave/\.github/workflows/release\.yml@refs/tags/'
          issuer='https://token.actions.githubusercontent.com'
          for file in staging/*; do
            case "$file" in
              *.sigstore.json) continue ;;
            esac
            cosign verify-blob "$file" \
              --bundle "${file}.sigstore.json" \
              --certificate-identity-regexp "^${identity}v[0-9].*$" \
              --certificate-oidc-issuer "$issuer"
          done
          while read -r _digest file; do
            gh attestation verify "staging/$file" \
              --repo Infrastacks/ne-enclave \
              --bundle staging/ne-enclave.provenance.sigstore.json \
              --signer-workflow Infrastacks/ne-enclave/.github/workflows/release.yml \
              --source-ref "$GITHUB_REF"
          done < staging/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: ne-release-assets
          path: staging/
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: [candidate, version-check]
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ne-release-assets
          path: staging
      - name: Publish verified candidate
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: staging/*

  npm:
    name: npm publish
    runs-on: ubuntu-24.04
    needs: [candidate, version-check]
    if: vars.ENABLE_SDK_PUBLISH == 'true'
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ne-release-assets
          path: staging
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - name: Publish verified TypeScript package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish staging/neuronedge-enclave-0.2.0.tgz --access public

  pypi:
    name: PyPI publish
    runs-on: ubuntu-24.04
    needs: [candidate, version-check]
    if: vars.ENABLE_SDK_PUBLISH == 'true'
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ne-release-assets
          path: staging
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install upload client
        run: python -m pip install --upgrade twine
      - name: Publish verified Python packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload staging/neuronedge_enclave-0.2.0-py3-none-any.whl staging/neuronedge_enclave-0.2.0.tar.gz
