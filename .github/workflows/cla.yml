# CLA enforcement. Runs on every pull request; the bot posts a sign-off
# comment on the PR and posts a "CLA Assistant" status check that branch
# protection requires before merge. Contributors sign by clicking the link
# in the bot comment (one-click, stored via their GitHub identity).
#
# This uses contributor-assistant/github-action (the action version of
# @cla-assistant). It needs no separately-installed GitHub App — it runs as
# a workflow step with the built-in GITHUB_TOKEN. See CLA.md for the terms
# contributors agree to.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Permission to read PR contents, post the comment, and push the signature
# store branch. Minimal scope; second token is used only for the signature
# branch commit.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-24.04
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The action needs a token with contents:write to commit signatures
          # to the cla-signatures branch. The default GITHUB_TOKEN works for
          # same-repo commits (no PAT needed). To enable cross-repo signature
          # storage later, add a CLA_ASSISTANT_ACCESS_TOKEN secret instead.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla-signatures/version1/cla.json"
          path-to-document: "https://github.com/Mindpool-Labs/ne-enclave/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: murraju,Mindpool-Labs,dependabot[bot],github-actions[bot]

          # Create the signature branch if it doesn't exist.
          create-file-if-not-exist: true
          # Lock the PR from merge until the CLA is signed.
          lock-check: true

          # The sign-off message the contributor types in the comment.
          custom-notsigned-prcomment: |
            Thanks for the contribution! Before we can merge, please sign our
            [Contributor License Agreement](https://github.com/Mindpool-Labs/ne-enclave/blob/main/CLA.md).

            It grants Mindpool a broad license to your contribution and
            preserves the project's option to relicense under any OSI-approved
            license no more restrictive than Apache-2.0. You retain your
            copyrights.

            To sign, comment on this PR with exactly:
            > I have read the CLA Document and I hereby sign the CLA
